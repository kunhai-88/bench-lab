<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页计算器</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.calculator {
  background: #2d2d2d;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  width: 340px;
}

.display {
  background: #1a1a2e;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: right;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

.expression {
  color: #888;
  font-size: 16px;
  min-height: 24px;
  word-break: break-all;
  margin-bottom: 6px;
}

.result {
  color: #fff;
  font-size: 36px;
  font-weight: 300;
  word-break: break-all;
  line-height: 1.2;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

button {
  border: none;
  border-radius: 12px;
  font-size: 20px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
  font-weight: 500;
  outline: none;
}

button:active {
  transform: scale(0.94);
}

.btn-number {
  background: #3d3d3d;
  color: #fff;
}

.btn-number:hover {
  background: #4d4d4d;
}

.btn-operator {
  background: #4a3f6b;
  color: #c4b5fd;
}

.btn-operator:hover {
  background: #5b4d82;
}

.btn-function {
  background: #4a4a4a;
  color: #a5b4fc;
}

.btn-function:hover {
  background: #5a5a5a;
}

.btn-equals {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  font-size: 24px;
}

.btn-equals:hover {
  background: linear-gradient(135deg, #7b8ef8, #8b5fbf);
}

.btn-clear {
  background: #6b2d2d;
  color: #fca5a5;
}

.btn-clear:hover {
  background: #7d3535;
}

.btn-zero {
  grid-column: span 2;
}
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="display">0</div>
  </div>
  <div class="buttons">
    <button class="btn-clear" onclick="clearAll()">C</button>
    <button class="btn-function" onclick="backspace()">⌫</button>
    <button class="btn-function" onclick="inputPercent()">%</button>
    <button class="btn-operator" onclick="inputOperator('/')">÷</button>

    <button class="btn-number" onclick="inputDigit('7')">7</button>
    <button class="btn-number" onclick="inputDigit('8')">8</button>
    <button class="btn-number" onclick="inputDigit('9')">9</button>
    <button class="btn-operator" onclick="inputOperator('*')">×</button>

    <button class="btn-number" onclick="inputDigit('4')">4</button>
    <button class="btn-number" onclick="inputDigit('5')">5</button>
    <button class="btn-number" onclick="inputDigit('6')">6</button>
    <button class="btn-operator" onclick="inputOperator('-')">−</button>

    <button class="btn-number" onclick="inputDigit('1')">1</button>
    <button class="btn-number" onclick="inputDigit('2')">2</button>
    <button class="btn-number" onclick="inputDigit('3')">3</button>
    <button class="btn-operator" onclick="inputOperator('+')">+</button>

    <button class="btn-number btn-zero" onclick="inputDigit('0')">0</button>
    <button class="btn-number" onclick="inputDot()">.</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>
</div>

<script>
let currentInput = '0';
let expression = '';
let shouldResetInput = false;
let hasError = false;
let tokens = [];
let lastWasOperator = false;
let justCalculated = false;

const displayEl = document.getElementById('display');
const expressionEl = document.getElementById('expression');

function updateDisplay() {
  displayEl.textContent = currentInput;
  let exprDisplay = '';
  for (let t of tokens) {
    if (t === '*') exprDisplay += ' × ';
    else if (t === '/') exprDisplay += ' ÷ ';
    else if (t === '+') exprDisplay += ' + ';
    else if (t === '-') exprDisplay += ' − ';
    else exprDisplay += t;
  }
  expressionEl.textContent = exprDisplay;
}

function clearAll() {
  currentInput = '0';
  tokens = [];
  shouldResetInput = false;
  hasError = false;
  lastWasOperator = false;
  justCalculated = false;
  updateDisplay();
}

function backspace() {
  if (hasError) {
    clearAll();
    return;
  }
  if (justCalculated) {
    return;
  }
  if (lastWasOperator) {
    if (tokens.length > 0) {
      tokens.pop();
      lastWasOperator = false;
      if (tokens.length > 0) {
        currentInput = tokens[tokens.length - 1];
      } else {
        currentInput = '0';
      }
    }
    updateDisplay();
    return;
  }
  if (currentInput.length > 1) {
    currentInput = currentInput.slice(0, -1);
  } else {
    currentInput = '0';
  }
  updateDisplay();
}

function inputDigit(d) {
  if (hasError) {
    clearAll();
  }
  if (justCalculated) {
    tokens = [];
    currentInput = '0';
    justCalculated = false;
    lastWasOperator = false;
  }
  if (shouldResetInput || lastWasOperator) {
    currentInput = '0';
    shouldResetInput = false;
    lastWasOperator = false;
  }
  if (currentInput === '0' && d !== '0') {
    currentInput = d;
  } else if (currentInput === '0' && d === '0') {
    currentInput = '0';
  } else {
    currentInput += d;
  }
  updateDisplay();
}

function inputDot() {
  if (hasError) {
    clearAll();
  }
  if (justCalculated) {
    tokens = [];
    currentInput = '0';
    justCalculated = false;
    lastWasOperator = false;
  }
  if (shouldResetInput || lastWasOperator) {
    currentInput = '0';
    shouldResetInput = false;
    lastWasOperator = false;
  }
  if (!currentInput.includes('.')) {
    currentInput += '.';
  }
  updateDisplay();
}

function inputOperator(op) {
  if (hasError) {
    clearAll();
    return;
  }
  justCalculated = false;

  if (lastWasOperator && tokens.length > 0) {
    tokens[tokens.length - 1] = op;
    updateDisplay();
    return;
  }

  tokens.push(currentInput);
  tokens.push(op);
  lastWasOperator = true;
  shouldResetInput = true;
  updateDisplay();
}

function inputPercent() {
  if (hasError) {
    clearAll();
    return;
  }
  let val = parseFloat(currentInput);
  if (isNaN(val)) return;
  currentInput = String(val / 100);
  updateDisplay();
}

function evaluateTokens(tkns) {
  let nums = [];
  let ops = [];

  for (let t of tkns) {
    if (t === '+' || t === '-' || t === '*' || t === '/') {
      ops.push(t);
    } else {
      nums.push(parseFloat(t));
    }
  }

  // First pass: handle * and /
  let i = 0;
  while (i < ops.length) {
    if (ops[i] === '*' || ops[i] === '/') {
      let result;
      if (ops[i] === '*') {
        result = nums[i] * nums[i + 1];
      } else {
        if (nums[i + 1] === 0) {
          return null; // division by zero
        }
        result = nums[i] / nums[i + 1];
      }
      nums.splice(i, 2, result);
      ops.splice(i, 1);
    } else {
      i++;
    }
  }

  // Second pass: handle + and -
  let result = nums[0];
  for (let j = 0; j < ops.length; j++) {
    if (ops[j] === '+') {
      result += nums[j + 1];
    } else if (ops[j] === '-') {
      result -= nums[j + 1];
    }
  }

  return result;
}

function calculate() {
  if (hasError) {
    clearAll();
    return;
  }

  let allTokens = [...tokens];
  if (!lastWasOperator) {
    allTokens.push(currentInput);
  } else {
    // Remove trailing operator
    if (allTokens.length > 0) {
      allTokens.pop();
    }
  }

  if (allTokens.length === 0) return;
  if (allTokens.length === 1) {
    currentInput = allTokens[0];
    tokens = [];
    justCalculated = true;
    lastWasOperator = false;
    updateDisplay();
    return;
  }

  let result = evaluateTokens(allTokens);

  if (result === null || !isFinite(result)) {
    currentInput = '错误';
    hasError = true;
    let exprDisplay = '';
    for (let t of allTokens) {
      if (t === '*') exprDisplay += ' × ';
      else if (t === '/') exprDisplay += ' ÷ ';
      else if (t === '+') exprDisplay += ' + ';
      else if (t === '-') exprDisplay += ' − ';
      else exprDisplay += t;
    }
    expressionEl.textContent = exprDisplay + ' =';
    displayEl.textContent = currentInput;
    tokens = [];
    lastWasOperator = false;
    justCalculated = false;
    return;
  }

  // Format result
  let resultStr;
  if (Number.isInteger(result) && Math.abs(result) < 1e15) {
    resultStr = result.toString();
  } else {
    resultStr = parseFloat(result.toPrecision(12)).toString();
  }

  let exprDisplay = '';
  for (let t of allTokens) {
    if (t === '*') exprDisplay += ' × ';
    else if (t === '/') exprDisplay += ' ÷ ';
    else if (t === '+') exprDisplay += ' + ';
    else if (t === '-') exprDisplay += ' − ';
    else exprDisplay += t;
  }
  expressionEl.textContent = exprDisplay + ' =';

  currentInput = resultStr;
  tokens = [];
  shouldResetInput = false;
  lastWasOperator = false;
  justCalculated = true;
  displayEl.textContent = currentInput;
}

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (e.key >= '0' && e.key <= '9') {
    inputDigit(e.key);
  } else if (e.key === '.') {
    inputDot();
  } else if (e.key === '+') {
    inputOperator('+');
  } else if (e.key === '-') {
    inputOperator('-');
  } else if (e.key === '*') {
    inputOperator('*');
  } else if (e.key === '/') {
    e.preventDefault();
    inputOperator('/');
  } else if (e.key === 'Enter' || e.key === '=') {
    calculate();
  } else if (e.key === 'Backspace') {
    backspace();
  } else if (e.key === 'Escape' || e.key === 'Delete') {
    clearAll();
  } else if (e.key === '%') {
    inputPercent();
  }
});

updateDisplay();
</script>

</body>
</html>
