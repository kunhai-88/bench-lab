<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页计算器</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --calc-bg: #ffffff;
            --btn-bg: #f8f9fa;
            --btn-hover: #e9ecef;
            --btn-active: #dee2e6;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --text-color: #333333;
            --operator-color: #ff9500;
            --operator-hover: #e08900;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator {
            background-color: var(--calc-bg);
            width: 100%;
            max-width: 360px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 20px;
        }

        .display-container {
            background-color: #222;
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            min-height: 1.5rem;
            margin-bottom: 5px;
        }

        .current-operand {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 500;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            background-color: var(--btn-bg);
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 20px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:active {
            background-color: var(--btn-active);
            transform: scale(0.98);
        }

        .span-two {
            grid-column: span 2;
        }

        .btn-operator {
            color: var(--operator-color);
            font-weight: bold;
            background-color: #fff0e0;
        }

        .btn-operator:hover {
            background-color: #ffe0b3;
        }

        .btn-equals {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-equals:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear, .btn-delete {
            color: #dc3545;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .calculator {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }
            .display-container {
                flex-grow: 1;
            }
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <div class="previous-operand" id="previous-operand"></div>
        <div class="current-operand" id="current-operand">0</div>
    </div>
    <div class="keypad">
        <button class="btn-clear span-two" onclick="calculator.clear()">AC</button>
        <button class="btn-delete" onclick="calculator.delete()">DEL</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('÷')">÷</button>
        
        <button onclick="calculator.appendNumber('7')">7</button>
        <button onclick="calculator.appendNumber('8')">8</button>
        <button onclick="calculator.appendNumber('9')">9</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('×')">×</button>
        
        <button onclick="calculator.appendNumber('4')">4</button>
        <button onclick="calculator.appendNumber('5')">5</button>
        <button onclick="calculator.appendNumber('6')">6</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('-')">-</button>
        
        <button onclick="calculator.appendNumber('1')">1</button>
        <button onclick="calculator.appendNumber('2')">2</button>
        <button onclick="calculator.appendNumber('3')">3</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('+')">+</button>
        
        <button onclick="calculator.appendNumber('.')">.</button>
        <button onclick="calculator.appendNumber('0')">0</button>
        <button class="btn-equals span-two" onclick="calculator.compute()">=</button>
    </div>
</div>

<script>
    class Calculator {
        constructor(previousOperandTextElement, currentOperandTextElement) {
            this.previousOperandTextElement = previousOperandTextElement;
            this.currentOperandTextElement = currentOperandTextElement;
            this.clear();
        }

        clear() {
            this.currentOperand = '0';
            this.previousOperand = '';
            this.operation = undefined;
            this.shouldResetScreen = false;
            this.updateDisplay();
        }

        delete() {
            if (this.shouldResetScreen) return;
            if (this.currentOperand === 'Error') {
                this.clear();
                return;
            }
            if (this.currentOperand.length === 1) {
                this.currentOperand = '0';
            } else {
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
            }
            this.updateDisplay();
        }

        appendNumber(number) {
            if (this.currentOperand === 'Error') this.clear();
            if (this.shouldResetScreen) {
                this.currentOperand = '';
                this.shouldResetScreen = false;
            }
            // 防止多个小数点
            if (number === '.' && this.currentOperand.includes('.')) return;
            // 防止前导零 (例如 05)
            if (number === '0' && this.currentOperand === '0') return;
            // 替换初始的0
            if (this.currentOperand === '0' && number !== '.') {
                this.currentOperand = number.toString();
            } else {
                this.currentOperand = this.currentOperand.toString() + number.toString();
            }
            this.updateDisplay();
        }

        chooseOperation(operation) {
            if (this.currentOperand === 'Error') return;
            if (this.currentOperand === '') return;
            
            // 如果之前已经有操作符，先计算之前的结果
            if (this.previousOperand !== '') {
                this.compute();
            }

            this.operation = operation;
            this.previousOperand = this.currentOperand;
            this.currentOperand = '';
            this.updateDisplay();
        }

        compute() {
            let computation;
            const prev = parseFloat(this.previousOperand);
            const current = parseFloat(this.currentOperand);

            if (isNaN(prev) || isNaN(current)) return;

            switch (this.operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        this.currentOperand = 'Error';
                        this.previousOperand = '';
                        this.operation = undefined;
                        this.shouldResetScreen = true;
                        this.updateDisplay();
                        return;
                    }
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            // 处理浮点数精度问题 (例如 0.1 + 0.2)
            computation = Math.round(computation * 100000000) / 100000000;

            this.currentOperand = computation.toString();
            this.operation = undefined;
            this.previousOperand = '';
            this.shouldResetScreen = true;
            this.updateDisplay();
        }

        getDisplayNumber(number) {
            if (number === 'Error') return number;
            const stringNumber = number.toString();
            const integerDigits = parseFloat(stringNumber.split('.')[0]);
            const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay;
            if (isNaN(integerDigits)) {
                integerDisplay = '';
            } else {
                integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
            }
            if (decimalDigits != null) {
                return `${integerDisplay}.${decimalDigits}`;
            } else {
                return integerDisplay;
            }
        }

        updateDisplay() {
            this.currentOperandTextElement.innerText = this.getDisplayNumber(this.currentOperand);
            if (this.operation != null) {
                this.previousOperandTextElement.innerText = 
                    `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
            } else {
                this.previousOperandTextElement.innerText = '';
            }
        }
    }

    const previousOperandTextElement = document.getElementById('previous-operand');
    const currentOperandTextElement = document.getElementById('current-operand');
    const calculator = new Calculator(previousOperandTextElement, currentOperandTextElement);

    // 键盘支持
    document.addEventListener('keydown', (event) => {
        let key = event.key;
        
        if (key >= '0' && key <= '9' || key === '.') {
            calculator.appendNumber(key);
        }
        if (key === '=' || key === 'Enter') {
            event.preventDefault(); // 防止Enter触发按钮点击
            calculator.compute();
        }
        if (key === 'Backspace') {
            calculator.delete();
        }
        if (key === 'Escape') {
            calculator.clear();
        }
        if (key === '+' || key === '-') {
            calculator.chooseOperation(key);
        }
        if (key === '*' || key === 'x') {
            calculator.chooseOperation('×');
        }
        if (key === '/') {
            event.preventDefault(); // 防止浏览器搜索快捷键
            calculator.chooseOperation('÷');
        }
    });
</script>

</body>
</html>
