<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算器</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0f0f0f;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  }
  .calc{
    width:340px;background:#1a1a1a;border-radius:24px;
    padding:24px 20px 20px;
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06),inset 0 1px 0 rgba(255,255,255,.04);
  }
  .display{
    background:#111;border-radius:16px;padding:20px 24px 18px;margin-bottom:18px;
    min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;
    overflow:hidden;border:1px solid rgba(255,255,255,.04);
  }
  .expr{font-size:14px;color:#666;min-height:20px;word-break:break-all;text-align:right;width:100%}
  .result{font-size:42px;font-weight:200;color:#e8e8e8;word-break:break-all;text-align:right;width:100%;line-height:1.2;transition:font-size .15s}
  .result.small{font-size:28px}
  .result.error{color:#ff6b6b;font-size:22px}
  .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .key{
    height:58px;border:none;border-radius:14px;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .12s,transform .08s,box-shadow .12s;
    -webkit-user-select:none;user-select:none;outline:none;
    font-family:inherit;
  }
  .key:active{transform:scale(.94)}
  .key.num{background:#2a2a2a;color:#f0f0f0;font-weight:400}
  .key.num:hover{background:#333}
  .key.op{background:#e8a030;color:#1a1a1a;font-weight:500;font-size:22px}
  .key.op:hover{background:#f0b040}
  .key.op.active{background:#f5c050;box-shadow:0 0 16px rgba(232,160,48,.4)}
  .key.fn{background:#3a3a3a;color:#ccc;font-weight:400}
  .key.fn:hover{background:#444}
  .key.zero{grid-column:span 2}
  .key:focus-visible{box-shadow:0 0 0 2px #e8a030}
  @media(max-width:380px){
    .calc{width:100%;border-radius:0;padding:16px 12px}
    .key{height:52px;font-size:18px}
    .result{font-size:36px}
  }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="keys" id="keys">
    <button class="key fn" data-action="clear">AC</button>
    <button class="key fn" data-action="backspace">⌫</button>
    <button class="key fn" data-action="percent">%</button>
    <button class="key op" data-action="op" data-op="/">÷</button>
    <button class="key num" data-action="digit" data-digit="7">7</button>
    <button class="key num" data-action="digit" data-digit="8">8</button>
    <button class="key num" data-action="digit" data-digit="9">9</button>
    <button class="key op" data-action="op" data-op="*">×</button>
    <button class="key num" data-action="digit" data-digit="4">4</button>
    <button class="key num" data-action="digit" data-digit="5">5</button>
    <button class="key num" data-action="digit" data-digit="6">6</button>
    <button class="key op" data-action="op" data-op="-">−</button>
    <button class="key num" data-action="digit" data-digit="1">1</button>
    <button class="key num" data-action="digit" data-digit="2">2</button>
    <button class="key num" data-action="digit" data-digit="3">3</button>
    <button class="key op" data-action="op" data-op="+">+</button>
    <button class="key num zero" data-action="digit" data-digit="0">0</button>
    <button class="key num" data-action="decimal">.</button>
    <button class="key op" data-action="equals">=</button>
  </div>
</div>
<script>
(function(){
  var exprEl=document.getElementById('expr');
  var resultEl=document.getElementById('result');
  var keysEl=document.getElementById('keys');

  // 状态
  var tokens=[];       // 已确认的token列表，如 ['3','+','5','*','2']
  var current='';      // 当前正在输入的数字字符串
  var justEval=false;  // 刚按了等号
  var errorState=false;

  function isOp(t){return t==='+'||t==='-'||t==='*'||t==='/'}
  function lastToken(){return tokens.length?tokens[tokens.length-1]:null}

  // 格式化数字显示
  function fmt(s){
    if(s==='-'||s===''||s==='.') return s;
    var n=parseFloat(s);
    if(isNaN(n)) return s;
    if(s.includes('.')&&s.endsWith('.')) return addCommas(s.slice(0,-1))+'.';
    if(s.includes('.')&&s.endsWith('0')&&s.indexOf('.')<s.length-1){
      var intPart=s.slice(0,s.indexOf('.'));
      var decPart=s.slice(s.indexOf('.'));
      return addCommas(intPart)+decPart;
    }
    return addCommas(s);
  }
  function addCommas(s){
    var parts=s.split('.');
    parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return parts.join('.');
  }

  // 构建表达式显示字符串
  function buildExprStr(){
    var out='';
    for(var i=0;i<tokens.length;i++){
      var t=tokens[i];
      if(isOp(t)){
        var sym={'+' :'+','-':'−','*':'×','/':'÷'}[t];
        out+=' '+sym+' ';
      }else{
        out+=fmt(t);
      }
    }
    if(current!==''){
      out+=fmt(current);
    }
    return out;
  }

  // 计算表达式
  function evaluate(){
    var all=tokens.slice();
    if(current!=='') all.push(current);
    if(all.length===0) return '0';
    // 去掉末尾运算符
    while(all.length&&isOp(all[all.length-1])) all.pop();
    if(all.length===0) return '0';

    // 转数字
    var nums=[];
    var ops=[];
    for(var i=0;i<all.length;i++){
      if(isOp(all[i])){
        ops.push(all[i]);
      }else{
        nums.push(parseFloat(all[i]));
      }
    }
    if(nums.length===0) return '0';
    if(nums.length===1) return cleanNum(nums[0]);

    // 先乘除
    var i=0;
    while(i<ops.length){
      if(ops[i]==='*'||ops[i]==='/'){
        var a=nums[i],b=nums[i+1];
        if(ops[i]==='/'&&b===0) return 'ERROR';
        var r=ops[i]==='*'?a*b:a/b;
        nums.splice(i,2,r);
        ops.splice(i,1);
      }else{
        i++;
      }
    }
    // 再加减
    var res=nums[0];
    for(var j=0;j<ops.length;j++){
      if(ops[j]==='+') res+=nums[j+1];
      else res-=nums[j+1];
    }
    return cleanNum(res);
  }

  function cleanNum(n){
    if(!isFinite(n)) return 'ERROR';
    // 修正浮点精度
    var s=parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  // 更新显示
  function updateDisplay(){
    var exprStr=buildExprStr();
    exprEl.textContent=exprStr;

    if(errorState){
      resultEl.textContent='错误';
      resultEl.className='result error';
      return;
    }

    // 实时预览结果
    var preview=evaluate();
    if(preview==='ERROR'){
      resultEl.textContent='错误';
      resultEl.className='result error';
    }else{
      resultEl.textContent=fmt(preview);
      resultEl.className='result'+(preview.length>10?' small':'');
    }
  }

  function clearAll(){
    tokens=[];current='';justEval=false;errorState=false;
    updateDisplay();
  }

  function backspace(){
    if(errorState){clearAll();return;}
    if(justEval){
      // 等号后退格清除当前数字
      current='';
      justEval=false;
      updateDisplay();
      return;
    }
    if(current.length>0){
      current=current.slice(0,-1);
    }else if(tokens.length>0){
      var lt=lastToken();
      if(isOp(lt)){
        tokens.pop();
      }else{
        var s=lt.toString();
        if(s.length>1){
          tokens[tokens.length-1]=s.slice(0,-1);
        }else{
          tokens.pop();
        }
      }
    }
    updateDisplay();
  }

  function inputDigit(d){
    if(errorState) clearAll();
    if(justEval){
      tokens=[];current='';justEval=false;
    }
    // 如果当前是0且输入非0，替换
    if(current==='0'&&d!=='0'){
      current=d;
    }else if(current==='0'&&d==='0'){
      // 不变
    }else{
      current+=d;
    }
    updateDisplay();
  }

  function inputDecimal(){
    if(errorState) clearAll();
    if(justEval){
      tokens=[];current='0.';justEval=false;
      updateDisplay();return;
    }
    if(current===''){
      current='0.';
    }else if(!current.includes('.')){
      current+='.';
    }
    updateDisplay();
  }

  function inputOp(op){
    if(errorState) clearAll();
    justEval=false;
    // 把current推入tokens
    if(current!==''){
      tokens.push(current);
      current='';
    }
    var lt=lastToken();
    if(lt===null){
      // 表达式开头可以输入负号
      if(op==='-'){
        current='-';
      }
      // 其他运算符忽略
      updateDisplay();return;
    }
    if(isOp(lt)){
      // 替换上一个运算符（除非是负号跟在运算符后面）
      if(op==='-'&&(lt==='*'||lt==='/')){
        current='-';
      }else{
        tokens[tokens.length-1]=op;
      }
    }else{
      tokens.push(op);
    }
    updateDisplay();
  }

  function inputPercent(){
    if(errorState) clearAll();
    if(current!==''){
      var n=parseFloat(current);
      if(!isNaN(n)){
        current=cleanNum(n/100);
        if(justEval){tokens=[];justEval=false;}
        updateDisplay();
      }
    }else if(tokens.length>0){
      var lt=lastToken();
      if(!isOp(lt)){
        var n2=parseFloat(lt);
        if(!isNaN(n2)){
          tokens[tokens.length-1]=cleanNum(n2/100);
          updateDisplay();
        }
      }
    }
  }

  function inputEquals(){
    if(errorState) clearAll();return;
    if(current===''&&tokens.length===0) return;
    var result=evaluate();
    if(result==='ERROR'){
      errorState=true;
      updateDisplay();
      return;
    }
    // 把完整表达式显示在上面
    var exprStr=buildExprStr()+' =';
    exprEl.textContent=exprStr;
    // 结果作为新的current
    tokens=[];
    current=result;
    justEval=true;
    resultEl.textContent=fmt(result);
    resultEl.className='result'+(result.length>10?' small':'');
  }

  // 按钮点击
  keysEl.addEventListener('click',function(e){
    var btn=e.target.closest('.key');
    if(!btn) return;
    var action=btn.dataset.action;
    if(action==='clear') clearAll();
    else if(action==='backspace') backspace();
    else if(action==='digit') inputDigit(btn.dataset.digit);
    else if(action==='decimal') inputDecimal();
    else if(action==='op') inputOp(btn.dataset.op);
    else if(action==='percent') inputPercent();
    else if(action==='equals') inputEquals();

    // 高亮运算符按钮
    highlightOp();
  });

  function highlightOp(){
    var opBtns=keysEl.querySelectorAll('.key.op[data-op]');
    var pendingOp=null;
    if(current===''&&tokens.length>0){
      var lt=lastToken();
      if(isOp(lt)) pendingOp=lt;
    }
    opBtns.forEach(function(b){
      if(b.dataset.op===pendingOp) b.classList.add('active');
      else b.classList.remove('active');
    });
  }

  // 键盘支持
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(k>='0'&&k<='9'){inputDigit(k);e.preventDefault();}
    else if(k==='.'){inputDecimal();e.preventDefault();}
    else if(k==='+'){inputOp('+');e.preventDefault();}
    else if(k==='-'){inputOp('-');e.preventDefault();}
    else if(k==='*'){inputOp('*');e.preventDefault();}
    else if(k==='/'){inputOp('/');e.preventDefault();}
    else if(k==='Enter'||k==='='){inputEquals();e.preventDefault();}
    else if(k==='Backspace'){backspace();e.preventDefault();}
    else if(k==='Escape'||k==='Delete'){clearAll();e.preventDefault();}
    else if(k==='%'){inputPercent();e.preventDefault();}
    highlightOp();
  });

  // 初始化
  updateDisplay();
})();
</script>
</body>
</html>
