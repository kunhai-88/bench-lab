<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5;
  }
  .calculator {
    width: 320px;
    background: #1e1e1e;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .display {
    background: #000;
    color: #fff;
    font-size: 36px;
    text-align: right;
    padding: 20px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    min-height: 70px;
    word-break: break-all;
    overflow: hidden;
  }
  .display.error {
    color: #ff6b6b;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    height: 60px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #333;
    color: #fff;
    transition: background 0.15s;
  }
  button:active {
    background: #555;
  }
  button.operator {
    background: #ff9500;
  }
  button.operator:active {
    background: #e08900;
  }
  button.function {
    background: #a5a5a5;
    color: #000;
  }
  button.function:active {
    background: #c0c0c0;
  }
  button.zero {
    grid-column: span 2;
  }
</style>
</head>
<body>
<div class="calculator">
  <div id="display" class="display">0</div>
  <div class="buttons">
    <button class="function" data-action="clear">AC</button>
    <button class="function" data-action="backspace">⌫</button>
    <button class="function" data-action="percent">%</button>
    <button class="operator" data-action="divide">÷</button>

    <button data-number="7">7</button>
    <button data-number="8">8</button>
    <button data-number="9">9</button>
    <button class="operator" data-action="multiply">×</button>

    <button data-number="4">4</button>
    <button data-number="5">5</button>
    <button data-number="6">6</button>
    <button class="operator" data-action="subtract">−</button>

    <button data-number="1">1</button>
    <button data-number="2">2</button>
    <button data-number="3">3</button>
    <button class="operator" data-action="add">+</button>

    <button class="zero" data-number="0">0</button>
    <button data-action="decimal">.</button>
    <button class="operator" data-action="equals">=</button>
  </div>
</div>

<script>
(function () {
  const display = document.getElementById('display');
  let currentInput = '0';
  let previousValue = null;
  let operator = null;
  let waitingForOperand = false;
  let justEvaluated = false;

  function updateDisplay() {
    display.textContent = currentInput;
    display.classList.remove('error');
  }

  function showError() {
    display.textContent = '错误';
    display.classList.add('error');
    currentInput = '0';
    previousValue = null;
    operator = null;
    waitingForOperand = false;
    justEvaluated = false;
  }

  function inputDigit(digit) {
    if (justEvaluated) {
      currentInput = digit;
      justEvaluated = false;
    } else if (waitingForOperand) {
      currentInput = digit;
      waitingForOperand = false;
    } else {
      currentInput = currentInput === '0' ? digit : currentInput + digit;
    }
    updateDisplay();
  }

  function inputDecimal() {
    if (justEvaluated) {
      currentInput = '0.';
      justEvaluated = false;
      updateDisplay();
      return;
    }
    if (waitingForOperand) {
      currentInput = '0.';
      waitingForOperand = false;
      updateDisplay();
      return;
    }
    if (!currentInput.includes('.')) {
      currentInput += '.';
    }
    updateDisplay();
  }

  function handleOperator(nextOperator) {
    const inputValue = parseFloat(currentInput);

    if (operator && !waitingForOperand) {
      const result = calculate(previousValue, inputValue, operator);
      if (result === 'Error') {
        showError();
        return;
      }
      currentInput = formatResult(result);
      previousValue = result;
    } else {
      previousValue = inputValue;
    }

    waitingForOperand = true;
    operator = nextOperator;
    justEvaluated = false;
    updateDisplay();
  }

  function calculate(left, right, op) {
    switch (op) {
      case 'add': return left + right;
      case 'subtract': return left - right;
      case 'multiply': return left * right;
      case 'divide':
        if (right === 0) return 'Error';
        return left / right;
      default: return right;
    }
  }

  function formatResult(value) {
    if (Number.isInteger(value)) return value.toString();
    let str = value.toPrecision(12);
    if (str.indexOf('.') !== -1) {
      str = str.replace(/0+$/, '').replace(/\.$/, '');
    }
    return str;
  }

  function handleEquals() {
    if (operator === null || waitingForOperand) return;
    const inputValue = parseFloat(currentInput);
    const result = calculate(previousValue, inputValue, operator);
    if (result === 'Error') {
      showError();
      return;
    }
    currentInput = formatResult(result);
    previousValue = null;
    operator = null;
    waitingForOperand = false;
    justEvaluated = true;
    updateDisplay();
  }

  function clearAll() {
    currentInput = '0';
    previousValue = null;
    operator = null;
    waitingForOperand = false;
    justEvaluated = false;
    updateDisplay();
  }

  function backspace() {
    if (justEvaluated || display.classList.contains('error')) {
      clearAll();
      return;
    }
    if (waitingForOperand) return;
    if (currentInput.length === 1 || (currentInput.length === 2 && currentInput[0] === '-')) {
      currentInput = '0';
    } else {
      currentInput = currentInput.slice(0, -1);
    }
    updateDisplay();
  }

  function handlePercent() {
    const value = parseFloat(currentInput);
    currentInput = formatResult(value / 100);
    updateDisplay();
  }

  document.querySelector('.buttons').addEventListener('click', function (e) {
    const target = e.target;
    if (!target.tagName === 'BUTTON') return;

    if (target.hasAttribute('data-number')) {
      inputDigit(target.getAttribute('data-number'));
      return;
    }

    const action = target.getAttribute('data-action');
    switch (action) {
      case 'decimal': inputDecimal(); break;
      case 'clear': clearAll(); break;
      case 'backspace': backspace(); break;
      case 'percent': handlePercent(); break;
      case 'add':
      case 'subtract':
      case 'multiply':
      case 'divide':
        handleOperator(action);
        break;
      case 'equals':
        handleEquals();
        break;
    }
  });

  document.addEventListener('keydown', function (e) {
    const key = e.key;

    if (key >= '0' && key <= '9') {
      inputDigit(key);
      return;
    }

    switch (key) {
      case '.':
      case ',':
        inputDecimal();
        break;
      case '+':
        handleOperator('add');
        break;
      case '-':
        handleOperator('subtract');
        break;
      case '*':
        handleOperator('multiply');
        break;
      case '/':
        e.preventDefault();
        handleOperator('divide');
        break;
      case 'Enter':
      case '=':
        e.preventDefault();
        handleEquals();
        break;
      case 'Backspace':
        backspace();
        break;
      case 'Escape':
      case 'Delete':
        clearAll();
        break;
      case '%':
        handlePercent();
        break;
    }
  });

  updateDisplay();
})();
</script>
</body>
</html>
