<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --primary: #5b6af0;
            --primary-light: #eef0ff;
            --border: #e8ecf1;
            --today-bg: #5b6af0;
            --today-text: #ffffff;
            --hover-bg: #f0f2ff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --radius: 20px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8edf5 0%, #f0f4f8 30%, #fdf6f0 70%, #f5e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .calendar-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            transition: all var(--transition);
        }

        .calendar-header {
            background: var(--primary);
            color: #ffffff;
            padding: 28px 30px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .month-year {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .month {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .year {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.85;
        }

        .nav-buttons {
            display: flex;
            gap: 6px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            backdrop-filter: blur(4px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.32);
            transform: scale(1.05);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .today-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        .today-btn:hover {
            background: rgba(255, 255, 255, 0.38);
            transform: translateY(-1px);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #fafbfc;
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
        }

        .weekday {
            text-align: center;
            padding: 14px 0;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .weekend {
            color: #e07b7b;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 12px 10px;
            gap: 2px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            position: relative;
            user-select: none;
        }

        .day-cell:hover:not(.empty):not(.today) {
            background: var(--hover-bg);
            transform: scale(1.05);
        }

        .day-cell.empty {
            cursor: default;
        }

        .day-cell.today {
            background: var(--today-bg);
            color: var(--today-text);
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(91, 106, 240, 0.4);
            border-radius: 16px;
        }

        .day-cell.today:hover {
            background: #4a5ae0;
            transform: scale(1.05);
        }

        .day-cell.other-month {
            color: #cbd0d8;
            pointer-events: none;
        }

        .day-cell.selected {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            box-shadow: inset 0 0 0 2px var(--primary);
        }

        .day-cell.selected.today {
            background: var(--today-bg);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(91, 106, 240, 0.5), inset 0 0 0 2px rgba(255,255,255,0.5);
        }

        .selected-info {
            padding: 16px 30px 24px;
            text-align: center;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 500;
            background: #fafbfc;
            border-top: 1px solid var(--border);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .selected-date-highlight {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .calendar-container {
                max-width: 100%;
                border-radius: 16px;
            }
            .calendar-header {
                padding: 22px 20px 20px;
            }
            .month {
                font-size: 1.5rem;
            }
            .day-cell {
                font-size: 0.85rem;
                border-radius: 12px;
            }
            .days-grid {
                padding: 8px 6px;
                gap: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <div class="month-year">
                <span class="month" id="monthDisplay">一月</span>
                <span class="year" id="yearDisplay">2025</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="today-btn" id="todayBtn">今天</button>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevMonth" aria-label="上个月">◀</button>
                    <button class="nav-btn" id="nextMonth" aria-label="下个月">▶</button>
                </div>
            </div>
        </div>
        <div class="weekdays">
            <div class="weekday weekend">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday weekend">六</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
        <div class="selected-info" id="selectedInfo">
            <span>📅</span> 点击日期查看
        </div>
    </div>

    <script>
        (function() {
            const monthDisplay = document.getElementById('monthDisplay');
            const yearDisplay = document.getElementById('yearDisplay');
            const daysGrid = document.getElementById('daysGrid');
            const selectedInfo = document.getElementById('selectedInfo');
            const prevMonthBtn = document.getElementById('prevMonth');
            const nextMonthBtn = document.getElementById('nextMonth');
            const todayBtn = document.getElementById('todayBtn');

            const monthNames = [
                '一月', '二月', '三月', '四月', '五月', '六月',
                '七月', '八月', '九月', '十月', '十一月', '十二月'
            ];

            const weekDayNames = ['日', '一', '二', '三', '四', '五', '六'];

            let currentDate = new Date();
            let selectedDate = null;
            let todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);

            function formatDate(date) {
                const y = date.getFullYear();
                const m = date.getMonth() + 1;
                const d = date.getDate();
                const w = weekDayNames[date.getDay()];
                return `${y}年${m}月${d}日 星期${w}`;
            }

            function isSameDay(d1, d2) {
                return d1.getFullYear() === d2.getFullYear() &&
                    d1.getMonth() === d2.getMonth() &&
                    d1.getDate() === d2.getDate();
            }

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                monthDisplay.textContent = monthNames[month];
                yearDisplay.textContent = year;

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startDayOfWeek = firstDay.getDay();

                const prevMonthLastDay = new Date(year, month, 0);
                const daysInPrevMonth = prevMonthLastDay.getDate();

                daysGrid.innerHTML = '';

                const totalCells = 42;
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                for (let i = 0; i < totalCells; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('day-cell');

                    let cellDate;
                    let isOtherMonth = false;

                    if (i < startDayOfWeek) {
                        const day = daysInPrevMonth - startDayOfWeek + i + 1;
                        cellDate = new Date(year, month - 1, day);
                        isOtherMonth = true;
                        cell.textContent = day;
                        cell.classList.add('other-month');
                    } else if (i >= startDayOfWeek + daysInMonth) {
                        const day = i - startDayOfWeek - daysInMonth + 1;
                        cellDate = new Date(year, month + 1, day);
                        isOtherMonth = true;
                        cell.textContent = day;
                        cell.classList.add('other-month');
                    } else {
                        const day = i - startDayOfWeek + 1;
                        cellDate = new Date(year, month, day);
                        cell.textContent = day;
                    }

                    if (!isOtherMonth) {
                        if (isSameDay(cellDate, today)) {
                            cell.classList.add('today');
                        }

                        if (selectedDate && isSameDay(cellDate, selectedDate)) {
                            cell.classList.add('selected');
                        }

                        cell.addEventListener('click', (function(date) {
                            return function() {
                                selectedDate = new Date(date);
                                renderCalendar();
                                selectedInfo.innerHTML = '<span>📅</span> 已选择: <span class="selected-date-highlight">' + formatDate(selectedDate) + '</span>';
                            };
                        })(cellDate));
                    } else {
                        cell.classList.add('empty');
                    }

                    daysGrid.appendChild(cell);
                }

                if (selectedDate) {
                    selectedInfo.innerHTML = '<span>📅</span> 已选择: <span class="selected-date-highlight">' + formatDate(selectedDate) + '</span>';
                } else {
                    selectedInfo.innerHTML = '<span>📅</span> 点击日期查看';
                }
            }

            prevMonthBtn.addEventListener('click', function() {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', function() {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            todayBtn.addEventListener('click', function() {
                currentDate = new Date();
                selectedDate = new Date();
                selectedDate.setHours(0, 0, 0, 0);
                renderCalendar();
                selectedInfo.innerHTML = '<span>📅</span> 已选择: <span class="selected-date-highlight">' + formatDate(selectedDate) + ' (今天)</span>';
            });

            renderCalendar();
        })();
    </script>
</body>
</html>
