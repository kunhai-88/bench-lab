<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calendar-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        .calendar-header {
            background: linear-gradient(to right, #4b6cb7, #182848);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .calendar-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }
        .date-display {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .nav-btn {
            background: #4b6cb7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover {
            background: #3a5795;
            transform: translateY(-2px);
        }
        .current-month {
            font-size: 1.8rem;
            color: #182848;
            font-weight: 600;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: #f1f5fd;
            padding: 15px 0;
            text-align: center;
            font-weight: 600;
            color: #4b6cb7;
            border-bottom: 1px solid #e1e8f9;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #eee;
        }
        .day-cell {
            background-color: white;
            min-height: 100px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s;
            position: relative;
        }
        .day-cell:hover {
            background-color: #f9fafc;
        }
        .day-number {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            align-self: flex-end;
            margin-bottom: 5px;
        }
        .other-month {
            color: #aaa !important;
            background-color: #fafafa;
        }
        .today {
            background-color: #eef4ff;
        }
        .today .day-number {
            color: #4b6cb7;
            background-color: #4b6cb7;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .event-marker {
            width: 6px;
            height: 6px;
            background-color: #ff6b6b;
            border-radius: 50%;
            margin-top: auto;
            align-self: center;
        }
        .footer {
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            background-color: #f8f9fa;
        }
        @media (max-width: 768px) {
            .calendar-container {
                border-radius: 10px;
            }
            .calendar-header h1 {
                font-size: 2rem;
            }
            .current-month {
                font-size: 1.5rem;
            }
            .day-cell {
                min-height: 80px;
                padding: 8px;
            }
            .day-number {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <h1>📅 网页日历</h1>
            <div class="date-display" id="currentDateDisplay"></div>
        </div>
        <div class="navigation">
            <button class="nav-btn" id="prevYearBtn">◀◀ 去年</button>
            <button class="nav-btn" id="prevMonthBtn">◀ 上月</button>
            <div class="current-month" id="currentMonthYear"></div>
            <button class="nav-btn" id="nextMonthBtn">下月 ▶</button>
            <button class="nav-btn" id="nextYearBtn">明年 ▶▶</button>
        </div>
        <div class="weekdays">
            <div>日</div>
            <div>一</div>
            <div>二</div>
            <div>三</div>
            <div>四</div>
            <div>五</div>
            <div>六</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="footer">
            点击日期可查看详情 • 使用左右按钮切换月份
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentDate = new Date();
            const calendarGrid = document.getElementById('calendarGrid');
            const currentMonthYearEl = document.getElementById('currentMonthYear');
            const currentDateDisplayEl = document.getElementById('currentDateDisplay');
            const prevMonthBtn = document.getElementById('prevMonthBtn');
            const nextMonthBtn = document.getElementById('nextMonthBtn');
            const prevYearBtn = document.getElementById('prevYearBtn');
            const nextYearBtn = document.getElementById('nextYearBtn');

            // 模拟一些事件日期（每月固定几天）
            const eventDays = new Set([3, 8, 15, 20, 25]);

            function updateDateDisplay() {
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                currentDateDisplayEl.textContent = currentDate.toLocaleDateString('zh-CN', options);
            }

            function renderCalendar(date) {
                const year = date.getFullYear();
                const month = date.getMonth();
                currentMonthYearEl.textContent = `${year}年 ${month + 1}月`;

                const firstDayOfMonth = new Date(year, month, 1);
                const lastDayOfMonth = new Date(year, month + 1, 0);
                const daysInMonth = lastDayOfMonth.getDate();
                const startingDay = firstDayOfMonth.getDay(); // 0 = 周日

                calendarGrid.innerHTML = '';

                // 上个月的日期
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                for (let i = 0; i < startingDay; i++) {
                    const day = prevMonthLastDay - startingDay + i + 1;
                    const dayCell = createDayCell(day, 'other-month');
                    calendarGrid.appendChild(dayCell);
                }

                // 当前月的日期
                const today = new Date();
                const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayCell = createDayCell(day);
                    if (isCurrentMonth && day === today.getDate()) {
                        dayCell.classList.add('today');
                    }
                    if (eventDays.has(day)) {
                        const marker = document.createElement('div');
                        marker.className = 'event-marker';
                        dayCell.appendChild(marker);
                    }
                    calendarGrid.appendChild(dayCell);
                }

                // 下个月的日期
                const totalCells = 42; // 6行 * 7天
                const remainingCells = totalCells - (startingDay + daysInMonth);
                for (let day = 1; day <= remainingCells; day++) {
                    const dayCell = createDayCell(day, 'other-month');
                    calendarGrid.appendChild(dayCell);
                }

                updateDateDisplay();
            }

            function createDayCell(dayNumber, extraClass = '') {
                const cell = document.createElement('div');
                cell.className = `day-cell ${extraClass}`;
                const daySpan = document.createElement('div');
                daySpan.className = 'day-number';
                daySpan.textContent = dayNumber;
                cell.appendChild(daySpan);

                cell.addEventListener('click', function() {
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth() + 1;
                    const isOtherMonth = extraClass.includes('other-month');
                    const displayMonth = isOtherMonth ? 
                        (dayNumber > 15 ? month - 1 : month + 1) : month;
                    alert(`您点击的日期是：${year}年${displayMonth}月${dayNumber}日`);
                });

                return cell;
            }

            function changeMonth(delta) {
                currentDate.setMonth(currentDate.getMonth() + delta);
                renderCalendar(currentDate);
            }

            function changeYear(delta) {
                currentDate.setFullYear(currentDate.getFullYear() + delta);
                renderCalendar(currentDate);
            }

            prevMonthBtn.addEventListener('click', () => changeMonth(-1));
            nextMonthBtn.addEventListener('click', () => changeMonth(1));
            prevYearBtn.addEventListener('click', () => changeYear(-1));
            nextYearBtn.addEventListener('click', () => changeYear(1));

            // 初始渲染
            renderCalendar(currentDate);
        });
    </script>
</body>
</html>
