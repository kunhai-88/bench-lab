<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calendar-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .calendar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .month-year {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .control-btn:focus {
            outline: 2px solid white;
            outline-offset: 2px;
        }

        .calendar-body {
            padding: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            padding: 10px 0;
            font-size: 14px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            position: relative;
        }

        .day:hover:not(.empty):not(.other-month) {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .day:focus {
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        .day.today {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .day.selected {
            background: #764ba2;
            color: white;
            font-weight: bold;
        }

        .day.other-month {
            color: #ccc;
        }

        .day.empty {
            cursor: default;
        }

        .selected-date {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 16px;
            color: #333;
        }

        .selected-date span {
            font-weight: 600;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .calendar-container {
                border-radius: 15px;
            }
            
            .calendar-header {
                padding: 20px 15px;
            }
            
            .month-year {
                font-size: 20px;
            }
            
            .day {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <div class="month-year" id="monthYear"></div>
            <div class="calendar-controls">
                <button class="control-btn" id="prevMonth" aria-label="上个月">‹</button>
                <button class="control-btn" id="todayBtn" aria-label="今天">今天</button>
                <button class="control-btn" id="nextMonth" aria-label="下个月">›</button>
            </div>
        </div>
        
        <div class="calendar-body">
            <div class="weekdays" id="weekdays"></div>
            <div class="days-grid" id="daysGrid"></div>
        </div>
        
        <div class="selected-date" id="selectedDate">
            请选择日期
        </div>
    </div>

    <script>
        class Calendar {
            constructor() {
                this.currentDate = new Date();
                this.selectedDate = null;
                this.monthYearElement = document.getElementById('monthYear');
                this.weekdaysElement = document.getElementById('weekdays');
                this.daysGridElement = document.getElementById('daysGrid');
                this.selectedDateElement = document.getElementById('selectedDate');
                
                this.initWeekdays();
                this.bindEvents();
                this.render();
            }
            
            initWeekdays() {
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                weekdays.forEach(day => {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'weekday';
                    dayElement.textContent = day;
                    this.weekdaysElement.appendChild(dayElement);
                });
            }
            
            bindEvents() {
                document.getElementById('prevMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.render();
                });
                
                document.getElementById('nextMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.render();
                });
                
                document.getElementById('todayBtn').addEventListener('click', () => {
                    this.currentDate = new Date();
                    this.selectedDate = new Date();
                    this.render();
                    this.updateSelectedDate();
                });
                
                // 键盘导航支持
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                        this.render();
                    } else if (e.key === 'ArrowRight') {
                        this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                        this.render();
                    }
                });
            }
            
            render() {
                this.renderMonthYear();
                this.renderDays();
            }
            
            renderMonthYear() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth() + 1;
                this.monthYearElement.textContent = `${year}年${month}月`;
            }
            
            renderDays() {
                this.daysGridElement.innerHTML = '';
                
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
                
                // 当月第一天
                const firstDay = new Date(year, month, 1);
                // 当月最后一天
                const lastDay = new Date(year, month + 1, 0);
                // 第一天是星期几（0-6）
                const firstDayOfWeek = firstDay.getDay();
                // 当月天数
                const daysInMonth = lastDay.getDate();
                
                // 上个月最后几天
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                
                // 创建日期网格
                let dayCount = 1;
                let nextMonthDay = 1;
                
                // 6行7列的网格
                for (let i = 0; i < 6; i++) {
                    for (let j = 0; j < 7; j++) {
                        const dayElement = document.createElement('div');
                        dayElement.className = 'day';
                        dayElement.tabIndex = 0; // 使日期可聚焦
                        
                        if (i === 0 && j < firstDayOfWeek) {
                            // 上个月的日期
                            const prevDay = prevMonthLastDay - firstDayOfWeek + j + 1;
                            dayElement.textContent = prevDay;
                            dayElement.classList.add('other-month');
                            dayElement.addEventListener('click', () => {
                                this.currentDate.setMonth(month - 1);
                                this.selectedDate = new Date(year, month - 1, prevDay);
                                this.render();
                                this.updateSelectedDate();
                            });
                        } else if (dayCount > daysInMonth) {
                            // 下个月的日期
                            dayElement.textContent = nextMonthDay;
                            dayElement.classList.add('other-month');
                            dayElement.addEventListener('click', () => {
                                this.currentDate.setMonth(month + 1);
                                this.selectedDate = new Date(year, month + 1, nextMonthDay);
                                this.render();
                                this.updateSelectedDate();
                            });
                            nextMonthDay++;
                        } else {
                            // 当月的日期
                            dayElement.textContent = dayCount;
                            
                            // 检查是否是今天
                            const today = new Date();
                            if (dayCount === today.getDate() && 
                                month === today.getMonth() && 
                                year === today.getFullYear()) {
                                dayElement.classList.add('today');
                            }
                            
                            // 检查是否是选中的日期
                            if (this.selectedDate && 
                                dayCount === this.selectedDate.getDate() && 
                                month === this.selectedDate.getMonth() && 
                                year === this.selectedDate.getFullYear()) {
                                dayElement.classList.add('selected');
                            }
                            
                            const currentDay = dayCount;
                            dayElement.addEventListener('click', () => {
                                this.selectedDate = new Date(year, month, currentDay);
                                this.render();
                                this.updateSelectedDate();
                            });
                            
                            // 键盘支持
                            dayElement.addEventListener('keydown', (e) => {
                                if (e.key === 'Enter' || e.key === ' ') {
                                    e.preventDefault();
                                    this.selectedDate = new Date(year, month, currentDay);
                                    this.render();
                                    this.updateSelectedDate();
                                }
                            });
                            
                            dayCount++;
                        }
                        
                        this.daysGridElement.appendChild(dayElement);
                    }
                    
                    // 如果已经显示完所有日期，停止创建更多行
                    if (dayCount > daysInMonth && i >= 4) {
                        break;
                    }
                }
            }
            
            updateSelectedDate() {
                if (this.selectedDate) {
                    const year = this.selectedDate.getFullYear();
                    const month = this.selectedDate.getMonth() + 1;
                    const day = this.selectedDate.getDate();
                    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                    const weekday = weekdays[this.selectedDate.getDay()];
                    
                    this.selectedDateElement.innerHTML = `已选择: <span>${year}年${month}月${day}日 ${weekday}</span>`;
                }
            }
        }
        
        // 初始化日历
        document.addEventListener('DOMContentLoaded', () => {
            new Calendar();
        });
    </script>
</body>
</html>
