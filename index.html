  </head>
  <body>
    <noscript>
      <div style="padding:40px 20px;text-align:center;color:#f1eadb;font-family:monospace;background:#080906;min-height:100vh;display:grid;place-items:center;">
        <div>
          <h1 style="color:#c6ff3d;margin:0 0 16px;">OpenRouter Bench Lab</h1>
          <p>本页需要 JavaScript 才能展示模型对比数据。请开启浏览器 JavaScript 后刷新。</p>
        </div>
      </div>
    </noscript>
    <canvas id="signal-canvas" aria-hidden="true"></canvas>
    <main class="shell">
      <header class="page-header">
        <nav class="topline" aria-label="页面状态">
          <a class="brand" href="#top" aria-label="OpenRouter 网页生成评测">
            <span class="brand-mark">OR</span>
            <span>Bench Lab</span>
          </a>
          <div class="topline-right">
            <a id="x-share-link" class="topline-action" href="https://x.com/intent/tweet?text=OpenRouter+Bench+Lab" target="_blank" rel="noreferrer">分享</a>
            <button id="copy-share-link" class="topline-action" type="button">复制链接</button>
            <span class="fx-badge">CNY <strong id="fx-pill">6.8336</strong></span>
          </div>
        </nav>

        <section class="intro-panel" id="top">
          <div>
            <h1>同一个需求，<br>不同模型会做成什么样？</h1>
            <p>选一个案例，比较模型生成的页面效果、成本、Token 和通过率。</p>
          </div>
          <div class="hero-meta">
            <strong id="active-case-summary">等待结果</strong>
            <small id="data-timestamp">读取本地静态数据</small>
          </div>
        </section>
      </header>

      <nav class="case-strip" aria-label="视图切换">
        <div class="view-toggle" id="view-toggle">
          <button class="view-btn is-active" type="button" data-view="case">按案例</button>
          <button class="view-btn" type="button" data-view="model">按模型</button>
        </div>
        <div id="case-list" class="case-chips"></div>
        <span id="case-count" class="case-count-badge">等待结果</span>
      </nav>

      <section class="matrix-panel" aria-label="模型输出对比">
        <div class="matrix-bar">
          <div class="matrix-bar-info">
            <h2 id="active-case-title">计算器</h2>
            <span id="active-case-checks" class="checks-label">-</span>
          </div>
          <p id="active-case-prompt" class="matrix-bar-prompt">-</p>
        </div>

        <div class="matrix-toolbar" aria-label="对比设置">
          <div class="matrix-summary" id="matrix-summary">
            <span class="loading-pulse">正在加载数据…</span>
          </div>
          <div class="toolbar-controls">
            <label class="select-control">
              <select id="sort-mode">
                <option value="model">默认顺序</option>
                <option value="cost">成本 ↑</option>
                <option value="tokens">Token ↑</option>
                <option value="latency">耗时 ↑</option>
                <option value="passed">通过 ↓</option>
              </select>
            </label>

            <label class="check-control">
              <input id="filter-artifact" type="checkbox" />
              <span>有页面</span>
            </label>

            <label class="check-control">
              <input id="filter-complete" type="checkbox" />
              <span>全部通过</span>
            </label>

            <label class="fx-control">
              <span>USD/CNY</span>
              <input id="fx-rate" type="number" min="0" step="0.0001" value="6.8336" />
            </label>
          </div>
        </div>

        <div id="comparison-matrix" class="comparison-matrix" aria-live="polite"></div>
      </section>

      <details class="data-drawer" id="data-drawer" aria-label="完整数据表">
        <summary>
          <div class="drawer-heading">
            <h3>完整数据 · 所有指标</h3>
            <span class="drawer-toggle-label">展开</span>
          </div>
        </summary>
        <div id="detail-table" class="detail-table-wrap"></div>
      </details>

      <footer class="footer-band">
        <span>同一个需求 · 真实生成页面</span>
        <span><a href="https://github.com/defto-ai/openrouter-bench-lab" target="_blank" rel="noreferrer" class="footer-link">GitHub 源码</a></span>
      </footer>
      <button id="back-to-top" class="back-to-top" type="button" aria-label="回到顶部" hidden>↑</button>
    </main>

    <script src="./script.js?v=case-8"></script>
  </body>
</html>
