      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23080906'/%3E%3Cpath d='M9 9h46v46H9z' fill='%23c6ff3d'/%3E%3Cpath d='M18 22h28v6H18zm0 14h18v6H18z' fill='%23080906'/%3E%3C/svg%3E"
    />

  </head>
  <body>
    <noscript>
      <div style="padding:40px 20px;text-align:center;color:#f1eadb;font-family:monospace;background:#080906;min-height:100vh;display:grid;place-items:center;">
        <div>
          <h1 style="color:#c6ff3d;margin:0 0 16px;">OpenRouter Bench Lab</h1>
          <p>本页需要 JavaScript 才能展示模型对比数据。请开启浏览器 JavaScript 后刷新。</p>
        </div>
      </div>
    </noscript>
    <canvas id="signal-canvas" aria-hidden="true"></canvas>
    <main class="shell">
      <header class="page-header">
        <nav class="topline" aria-label="页面状态">
          <a class="brand" href="#top" aria-label="OpenRouter 网页生成评测">
            <span class="brand-mark">OR</span>
            <span>Bench Lab</span>
          </a>
          <div class="status-strip" aria-label="数据状态">
            <span>同一需求</span>
            <span>真实结果</span>
            <span>汇率 <strong id="fx-pill">6.8336</strong></span>
          </div>
        </nav>

        <section class="intro-panel" id="top">
          <div>
            <p class="eyebrow">OpenRouter Bench Lab</p>
            <h1>同一个需求，不同模型会做成什么样？</h1>
            <p>
              选一个案例，直接看每个模型生成出来的页面。价格、Token、耗时和测试结果放在旁边，方便你自己比较。
            </p>
          </div>
          <div class="context-stack" aria-label="数据口径">
            <span>正在看</span>
            <strong id="active-case-summary">等待结果</strong>
            <small id="data-timestamp">读取本地静态数据</small>
          </div>
        </section>
        <section class="share-toolbar" aria-label="分享">
          <a id="x-share-link" class="share-btn" href="https://x.com/intent/tweet?text=OpenRouter+Bench+Lab" target="_blank" rel="noreferrer">去 X 分享</a>
          <button id="copy-share-link" class="share-btn secondary">复制页面链接</button>
        </section>
      </header>

      <section class="case-panel" aria-label="案例选择">
        <div class="section-heading">
          <div>
            <p class="eyebrow">案例</p>
            <h2>先选一个要看的案例</h2>
          </div>
          <span id="case-count" class="neutral-chip">等待结果</span>
        </div>
        <div id="case-list" class="case-list"></div>
      </section>

      <section class="matrix-panel" aria-label="模型输出对比">
        <div class="case-context" aria-label="当前案例要求">
          <div>
            <p class="eyebrow">统一需求</p>
            <h2 id="active-case-title">计算器</h2>
            <p id="active-case-prompt">-</p>
          </div>
          <span id="active-case-checks" class="neutral-chip">-</span>
        </div>

        <div class="matrix-toolbar" aria-label="对比设置">
          <label class="select-control">
            <span>排序</span>
            <select id="sort-mode">
              <option value="model">默认顺序</option>
              <option value="cost">成本从低到高</option>
              <option value="tokens">Token 从少到多</option>
              <option value="latency">耗时从短到长</option>
              <option value="passed">通过项从多到少</option>
            </select>
          </label>

          <label class="check-control">
            <input id="filter-artifact" type="checkbox" />
            <span>有页面</span>
          </label>

          <label class="check-control">
            <input id="filter-complete" type="checkbox" />
            <span>全部通过</span>
          </label>

          <label class="fx-control">
            <span>USD/CNY</span>
            <input id="fx-rate" type="number" min="0" step="0.0001" value="6.8336" />
          </label>
        </div>

        <div class="matrix-summary" id="matrix-summary">
          <span class="loading-pulse">正在加载数据…</span>
        </div>
        <div id="comparison-matrix" class="comparison-matrix" aria-live="polite"></div>
      </section>

      <details class="data-drawer" id="data-drawer" aria-label="完整数据表">
        <summary>
          <div class="drawer-heading">
            <div>
              <p class="eyebrow">完整数据</p>
              <h2>查看所有指标</h2>
            </div>
            <span class="drawer-toggle-label">展开</span>
          </div>
        </summary>
        <div id="detail-table" class="detail-table-wrap"></div>
      </details>

      <footer class="footer-band">
        <span>同一个需求 · 真实生成页面</span>
        <span><a href="https://github.com/defto-ai/openrouter-bench-lab" target="_blank" rel="noreferrer" class="footer-link">GitHub 源码</a></span>
      </footer>
      <button id="back-to-top" class="back-to-top" type="button" aria-label="回到顶部" hidden>↑</button>
    </main>

    <script src="./script.js?v=case-5"></script>
  </body>
</html>
